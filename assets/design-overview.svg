        font-size: 80px;
      }
      .divider {
        fill: none;
        stroke-dasharray: 12 12;
        stroke: currentcolor;
        stroke-width: 2px;
        opacity: 0.4;
      }
      tspan {
        letter-spacing: 0.08em;
      }
      .arrows path,
      .arrows polyline {
        fill: none;
        stroke: currentColor;
        stroke-width: 8px;
      }
      .arrows polygon {
        fill: currentColor;
      }
      .fovea-intersection {
        fill: url(#hatch-l);
        stroke: currentColor;
        stroke-width: 4px;
        stroke-miterlimit: 10;
      }
      .wide-intersection {
        fill: url(#hatch-r);
        stroke: currentColor;
        stroke-width: 2px;
        stroke-miterlimit: 10;
      }
      .wide-intersection.subfig-a {
        opacity: 0.8;
      }
      .wide-intersection.subfig-c {
        opacity: 0.6;
      }
    </style>
